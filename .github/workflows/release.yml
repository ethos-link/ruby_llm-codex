name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  test:
    uses: ./.github/workflows/ruby.yml

  release:
    needs: test
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ruby
          bundler-cache: true

      - name: Extract version from tag
        id: version
        run: echo "value=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Verify version matches tag
        run: |
          GEM_VERSION=$(ruby -r./lib/ruby_llm/codex/version -e "puts RubyLLM::Codex::VERSION")
          TAG_VERSION="${{ steps.version.outputs.value }}"
          if [ "$GEM_VERSION" != "$TAG_VERSION" ]; then
            echo "Version mismatch: tag=$TAG_VERSION gem=$GEM_VERSION"
            exit 1
          fi

      - name: Extract release notes from changelog
        run: |
          VERSION="${{ steps.version.outputs.value }}"

          awk -v version="$VERSION" '
            $0 ~ "^## \\[" version "\\]" { found=1 }
            found && $0 ~ "^## \\[" && $0 !~ "^## \\[" version "\\]" { exit }
            found { print }
          ' CHANGELOG.md > release_notes.md

          if [ ! -s release_notes.md ]; then
            echo "No changelog entry found for v$VERSION"
            exit 1
          fi

      - name: Build gem
        run: bundle exec rake build

      - name: Configure RubyGems credentials
        uses: rubygems/configure-rubygems-credentials@bc6dd217f8a4f919d6835fcfefd470ef821f5c44

      - name: Publish to RubyGems
        run: gem push "pkg/ruby_llm-codex-${{ steps.version.outputs.value }}.gem"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          generate_release_notes: false
